<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Karate Graph visual report preview</title>
  <desc id="desc">A preview of the Karate Graph HTML dashboard with summary metrics, filters, dependency graph, and node detail panel.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#edf4f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#243042" flood-opacity=".16"/>
    </filter>
    <style>
      .ui { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .small { font-size: 13px; fill: #5f6f7a; }
      .label { font-size: 14px; fill: #25313b; font-weight: 700; }
      .muted { font-size: 12px; fill: #7b8994; }
      .metric { font-size: 30px; fill: #17232d; font-weight: 800; }
      .chip { font-size: 12px; fill: #40515d; font-weight: 700; }
      .nodeText { font-size: 12px; fill: #20303b; font-weight: 700; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#page)"/>

  <g class="ui" filter="url(#shadow)">
    <rect x="64" y="46" width="1152" height="628" rx="18" fill="#ffffff"/>

    <rect x="64" y="46" width="1152" height="74" rx="18" fill="#17323b"/>
    <path d="M64 102h1152v18H64z" fill="#17323b"/>
    <circle cx="96" cy="83" r="8" fill="#f87171"/>
    <circle cx="122" cy="83" r="8" fill="#fbbf24"/>
    <circle cx="148" cy="83" r="8" fill="#34d399"/>
    <text x="184" y="90" fill="#ffffff" font-size="22" font-weight="800">Karate Graph Visual Report</text>
    <text x="998" y="88" fill="#c7d5db" font-size="13">feature | api | java | js | db</text>

    <rect x="88" y="146" width="256" height="502" rx="12" fill="#f6f9fb" stroke="#dce7ec"/>
    <text x="112" y="178" class="label">Dashboard</text>
    <rect x="112" y="196" width="208" height="36" rx="8" fill="#ffffff" stroke="#dce7ec"/>
    <text x="130" y="219" class="muted">Search test case, API, DB...</text>

    <g>
      <rect x="112" y="256" width="88" height="70" rx="10" fill="#ffffff" stroke="#dce7ec"/>
      <text x="130" y="282" class="muted">Tests</text>
      <text x="130" y="311" class="metric">128</text>
      <rect x="216" y="256" width="104" height="70" rx="10" fill="#ffffff" stroke="#dce7ec"/>
      <text x="234" y="282" class="muted">APIs</text>
      <text x="234" y="311" class="metric">46</text>
      <rect x="112" y="342" width="88" height="70" rx="10" fill="#ffffff" stroke="#dce7ec"/>
      <text x="130" y="368" class="muted">JS</text>
      <text x="130" y="397" class="metric">31</text>
      <rect x="216" y="342" width="104" height="70" rx="10" fill="#ffffff" stroke="#dce7ec"/>
      <text x="234" y="368" class="muted">DB links</text>
      <text x="234" y="397" class="metric">18</text>
    </g>

    <text x="112" y="454" class="label">Quick Filters</text>
    <g>
      <rect x="112" y="474" width="88" height="28" rx="14" fill="#e8f5f3"/>
      <text x="130" y="493" class="chip">API</text>
      <rect x="210" y="474" width="110" height="28" rx="14" fill="#edf2ff"/>
      <text x="228" y="493" class="chip">Feature</text>
      <rect x="112" y="514" width="92" height="28" rx="14" fill="#fff4e5"/>
      <text x="130" y="533" class="chip">Failure</text>
      <rect x="214" y="514" width="106" height="28" rx="14" fill="#f0f8e8"/>
      <text x="232" y="533" class="chip">Reusable</text>
      <rect x="112" y="554" width="92" height="28" rx="14" fill="#f3efff"/>
      <text x="130" y="573" class="chip">Java</text>
      <rect x="214" y="554" width="106" height="28" rx="14" fill="#e8f4fb"/>
      <text x="232" y="573" class="chip">Database</text>
    </g>

    <rect x="368" y="146" width="534" height="502" rx="12" fill="#fbfdfe" stroke="#dce7ec"/>
    <text x="392" y="178" class="label">Dependency Graph</text>
    <text x="772" y="178" class="muted">impact view</text>

    <g stroke="#a8c3cc" stroke-width="2">
      <line x1="628" y1="374" x2="510" y2="282"/>
      <line x1="628" y1="374" x2="742" y2="276"/>
      <line x1="628" y1="374" x2="500" y2="472"/>
      <line x1="628" y1="374" x2="752" y2="472"/>
      <line x1="510" y1="282" x2="454" y2="374"/>
      <line x1="742" y1="276" x2="810" y2="364"/>
      <line x1="500" y1="472" x2="454" y2="374"/>
      <line x1="752" y1="472" x2="810" y2="364"/>
      <line x1="628" y1="374" x2="650" y2="544"/>
    </g>

    <g>
      <circle cx="628" cy="374" r="58" fill="#e7f7f3" stroke="#0f766e" stroke-width="4"/>
      <text x="589" y="370" class="nodeText">Checkout</text>
      <text x="595" y="388" class="muted">feature</text>

      <rect x="456" y="246" width="108" height="72" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
      <text x="480" y="278" class="nodeText">Order API</text>
      <text x="486" y="296" class="muted">POST /orders</text>

      <rect x="688" y="240" width="108" height="72" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
      <text x="714" y="272" class="nodeText">DB Query</text>
      <text x="711" y="290" class="muted">orders</text>

      <rect x="400" y="338" width="108" height="72" rx="14" fill="#f4f0ff" stroke="#7c3aed" stroke-width="3"/>
      <text x="426" y="370" class="nodeText">Java</text>
      <text x="415" y="388" class="muted">RandomUtil</text>

      <rect x="756" y="328" width="108" height="72" rx="14" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
      <text x="784" y="360" class="nodeText">JS</text>
      <text x="779" y="378" class="muted">helpers</text>

      <rect x="444" y="436" width="112" height="72" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
      <text x="473" y="468" class="nodeText">Failed</text>
      <text x="460" y="486" class="muted">TC-103</text>

      <rect x="696" y="436" width="112" height="72" rx="14" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
      <text x="724" y="468" class="nodeText">Locator</text>
      <text x="716" y="486" class="muted">checkout.json</text>

      <rect x="596" y="520" width="108" height="56" rx="14" fill="#f7fee7" stroke="#65a30d" stroke-width="3"/>
      <text x="626" y="552" class="nodeText">Retest</text>
    </g>

    <rect x="926" y="146" width="266" height="502" rx="12" fill="#f6f9fb" stroke="#dce7ec"/>
    <text x="950" y="178" class="label">Selected Node</text>
    <rect x="950" y="204" width="218" height="106" rx="10" fill="#ffffff" stroke="#dce7ec"/>
    <text x="970" y="232" class="label">TC-103 - Submit order</text>
    <text x="970" y="258" class="small">Status: failed</text>
    <text x="970" y="282" class="small">Impact: checkout, order API, DB</text>

    <text x="950" y="350" class="label">AI Context</text>
    <g class="small">
      <text x="950" y="382">- feature intent</text>
      <text x="950" y="410">- variable/data flow</text>
      <text x="950" y="438">- call/read chain</text>
      <text x="950" y="466">- failure history</text>
      <text x="950" y="494">- fix priority</text>
    </g>

    <rect x="950" y="532" width="218" height="68" rx="10" fill="#17323b"/>
    <text x="970" y="562" fill="#ffffff" font-size="15" font-weight="800">Suggested next run</text>
    <text x="970" y="585" fill="#c7d5db" font-size="13">6 high-signal test cases</text>
  </g>
</svg>
